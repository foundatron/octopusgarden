name: Docs Reminder

on:
  pull_request:
    paths:
      # embedmd source files referenced in docs/architecture.md
      - internal/llm/client.go
      - internal/spec/types.go
      - internal/scenario/types.go
      - internal/attractor/attractor.go
      - internal/attractor/convergence.go
      - internal/gene/gene.go
      # new packages under internal/
      - "internal/**/*.go"

permissions:
  contents: read
  pull-requests: write

jobs:
  remind:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'docs-ok') }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check if docs need updating
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          # Check if architecture.md was already modified
          if git diff --name-only "$BASE"..."$HEAD" | grep -q '^docs/architecture.md$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REMIND=false

          # Check if any embedmd source files changed
          EMBEDMD_FILES="internal/llm/client.go internal/spec/types.go internal/scenario/types.go internal/attractor/attractor.go internal/attractor/convergence.go internal/gene/gene.go"
          for f in $EMBEDMD_FILES; do
            if git diff --name-only "$BASE"..."$HEAD" | grep -q "^${f}$"; then
              REMIND=true
              break
            fi
          done

          # Check if a new internal/ directory appeared
          if [ "$REMIND" = "false" ]; then
            NEW_DIRS=$(git diff --name-only --diff-filter=A "$BASE"..."$HEAD" \
              | grep '^internal/.*\.go$' \
              | sed 's|/[^/]*$||' \
              | sort -u)
            for dir in $NEW_DIRS; do
              # If no files existed in this directory before, it's a new package
              if ! git ls-tree -r --name-only "$BASE" -- "$dir/" 2>/dev/null | grep -q .; then
                REMIND=true
                break
              fi
            done
          fi

          echo "skip=$( [ "$REMIND" = "true" ] && echo false || echo true )" >> "$GITHUB_OUTPUT"

      - name: Post reminder comment
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          MARKER="<!-- docs-reminder -->"
          BODY="${MARKER}
          **Docs reminder**: This PR changes files referenced by \`docs/architecture.md\` (embedmd sources or new internal packages) but does not update the doc.

          Please check if \`docs/architecture.md\` needs updating. Run \`make docs\` to sync embedded code blocks.

          Add the \`docs-ok\` label to suppress this reminder."

          # Delete any previous reminder comment to avoid duplicates
          gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | xargs -I{} gh api -X DELETE "repos/${{ github.repository }}/issues/${PR}/comments/{}" 2>/dev/null || true

          gh pr comment "$PR" --body "$BODY"
