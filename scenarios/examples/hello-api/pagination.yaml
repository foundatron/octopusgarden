id: pagination
description: Verify pagination with limit and offset
type: functional
satisfaction_criteria: Pagination returns correct subsets and total count

setup:
  - description: Create item 1
    request:
      method: POST
      path: /items
      body:
        name: "Page Item 1"
  - description: Create item 2
    request:
      method: POST
      path: /items
      body:
        name: "Page Item 2"
  - description: Create item 3
    request:
      method: POST
      path: /items
      body:
        name: "Page Item 3"

steps:
  - description: Get first page with limit 2
    request:
      method: GET
      path: /items?limit=2&offset=0
    expect: "Status 200. Response has 'items' array with exactly 2 items and 'total' field equal to 3."

  - description: Get second page with limit 2
    request:
      method: GET
      path: /items?limit=2&offset=2
    expect: "Status 200. Response has 'items' array with exactly 1 item and 'total' field equal to 3."
