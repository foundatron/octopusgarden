version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/octog
    binary: octog
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^style:"
      - "^ci:"
      - "^build:"

release:
  github:
    owner: foundatron
    name: octopusgarden
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: foundatron
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/foundatron/octopusgarden"
    description: "Autonomous software dark factory: specs to working code via attractor loop"
    license: MIT
    skip_upload: auto
    test: |
      system "#{bin}/octog", "--help"
