default_stages: [pre-commit]

repos:
  # ── Conventional Commits (commit-msg hook) ──────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, chore, build, ci, revert]

  # ── Secret detection ────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data.
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail --no-update'
        language: system
        stages: [pre-commit, pre-push]

  # ── Universal hygiene ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Markdown ────────────────────────────────────────────────────────────────
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
        args: [--wrap, "100"]
        exclude: ^(schemas/(spec|scenario)-format\.md|docs/architecture\.md|\.claude/)

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        exclude: ^(schemas/(spec|scenario)-format\.md|\.claude/)

  # ── Python ─────────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  # ── Dockerfiles (future-proof, dormant until session 4 Docker work) ─────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker

  # ── Makefile ─────────────────────────────────────────────────────────────────
  - repo: https://github.com/checkmake/checkmake
    rev: v0.3.2
    hooks:
      - id: checkmake

  # ── Go: generated docs must be up to date ──────────────────────────────────
  - repo: local
    hooks:
      - id: go-generate-check
        name: go generate (stale check)
        language: system
        entry: bash -c 'go generate ./... && git diff --exit-code -- schemas/spec-format.md schemas/scenario-format.md'
        pass_filenames: false

  # ── Embedded code in docs must be up to date ──────────────────────────────
  - repo: local
    hooks:
      - id: embedmd-check
        name: embedmd (stale check)
        language: system
        entry: bash -c 'go run github.com/campoy/embedmd/v2@latest -d docs/*.md'
        pass_filenames: false
        stages: [pre-push]

  # ── Go: format + incremental lint on commit ─────────────────────────────────
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.4.0
    hooks:
      - id: golangci-lint-config-verify
      - id: golangci-lint-fmt
      - id: golangci-lint
        name: golangci-lint (incremental)
        args: [--new-from-rev=HEAD, --fix]

  # ── Go: full lint + tests on push ───────────────────────────────────────────
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.4.0
    hooks:
      - id: golangci-lint
        name: golangci-lint (full module)
        args: [--fix]
        stages: [pre-push]

  - repo: local
    hooks:
      - id: go-test
        name: go test
        language: system
        entry: go test ./...
        pass_filenames: false
        stages: [pre-push]
