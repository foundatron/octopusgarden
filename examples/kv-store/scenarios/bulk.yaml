id: bulk
description: Bulk set with partial success
type: functional
tier: 3
satisfaction_criteria: Bulk endpoint stores valid records and reports errors for invalid ones

steps:
  - description: Bulk set with mix of valid and invalid
    request:
      method: POST
      path: /kv/_bulk
      body:
        records:
          - key: "bulk-a"
            value: 1
          - key: "bulk-b"
            value: 2
          - key: ""
            value: 3
    expect: "Status 200. Response has created=2 and errors array with 1 entry for the empty key."

  - description: Verify valid records were stored
    request:
      method: GET
      path: /kv/bulk-a
    expect: "Status 200. Value is 1."

  - description: Bulk exceeding 100 records
    request:
      method: POST
      path: /kv/_bulk
      body:
        records: []
    expect: "Status 400 if more than 100 records are sent. Since we sent 0, status 200 with created=0."
