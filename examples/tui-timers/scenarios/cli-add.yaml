id: cli-add
description: Add subcommand creates timer presets and the file
type: functional
tier: 1
satisfaction_criteria: Adding timers creates the file, exits 0, and timers appear in list output

steps:
  - description: Add first timer
    exec:
      command: myapp add --file /tmp/timers.json Eggs 180
    expect: "Exit code 0"
    capture:
      - name: add_exit
        source: exitcode

  - description: Add second timer
    exec:
      command: myapp add --file /tmp/timers.json Tea 120
    expect: "Exit code 0"

  - description: List shows both timers with MM:SS format
    exec:
      command: myapp list --file /tmp/timers.json
    expect: "Stdout shows Eggs with 03:00 and Tea with 02:00"
    capture:
      - name: list_output
        source: stdout
