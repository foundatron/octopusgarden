id: timer-done
description: Timer reaching zero transitions to DONE state
type: functional
tier: 1
satisfaction_criteria: Timer shows DONE and 00:00 after countdown completes, log shows completion event

setup:
  - description: Create timer file with a 3-second timer
    exec:
      command: sh -c 'printf "[{\"name\":\"Quick\",\"seconds\":3}]" > /tmp/timers.json'

  - description: Launch TUI
    tui:
      command: "myapp tui --file /tmp/timers.json"
      wait_for: "READY"

steps:
  - description: Start the timer
    tui:
      send_key: "space"
      wait_for: "RUNNING"
    expect: "Timer is now RUNNING"

  - description: Wait for timer to complete
    tui:
      wait_for: "DONE"
      timeout: 8s
    expect: "Timer state changes to DONE after reaching zero"

  - description: Timer shows zero time
    tui:
      assert_screen: "00:00"
    expect: "Timer displays 00:00"

  - description: Log shows completion event
    tui:
      assert_screen: "Done: Quick"
    expect: "Log panel shows Done event for the timer"

  - description: Quit cleanly
    tui:
      send_key: "q"
    capture:
      - name: exit_code
        source: exit_code
    expect: "Exit code is 0"
