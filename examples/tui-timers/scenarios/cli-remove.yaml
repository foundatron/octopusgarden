id: cli-remove
description: Remove subcommand deletes a timer by name
type: functional
tier: 1
satisfaction_criteria: Removing a timer updates the file, exits 0, and timer no longer appears in list

setup:
  - description: Create timer file with two presets
    exec:
      command: sh -c 'printf "[{\"name\":\"Eggs\",\"seconds\":180},{\"name\":\"Tea\",\"seconds\":120}]" > /tmp/timers.json'

steps:
  - description: Remove Eggs timer
    exec:
      command: myapp remove --file /tmp/timers.json Eggs
    expect: "Exit code 0"
    capture:
      - name: remove_exit
        source: exitcode

  - description: List shows only Tea
    exec:
      command: myapp list --file /tmp/timers.json
    expect: "Stdout shows Tea with 02:00 but not Eggs"
    capture:
      - name: list_output
        source: stdout

  - description: Remove nonexistent timer exits 1
    exec:
      command: myapp remove --file /tmp/timers.json Nonexistent
    expect: "Exit code 1 with an error message on stderr"
    capture:
      - name: bad_remove_exit
        source: exitcode
